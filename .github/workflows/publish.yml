name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      dry_run:
        description: Run publish in dry-run mode
        required: false
        default: false
        type: boolean

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: publish-npm
      cancel-in-progress: false
    env:
      NPM_CONFIG_PROVENANCE: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          node_version: "24"
          pnpm_version: "10.17.1"

      - name: Configure npm registry
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve publish tag
        id: publish_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "npm_tag=next" >> "$GITHUB_OUTPUT"
            else
              echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "npm_tag=${{ inputs.npm_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release tag matches package version
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "release" ]; then
            EXPECTED_TAG="v${PKG_VERSION}"
            if [ "${{ github.event.release.tag_name }}" != "$EXPECTED_TAG" ]; then
              echo "Release tag ${{ github.event.release.tag_name }} does not match package.json version $PKG_VERSION" >&2
              exit 1
            fi
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Test
        run: pnpm run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --access public --provenance --tag "${{ steps.publish_tag.outputs.npm_tag }}" --dry-run
          else
            npm publish --access public --provenance --tag "${{ steps.publish_tag.outputs.npm_tag }}"
          fi
