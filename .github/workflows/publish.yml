name: Publish

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      dry_run:
        description: Run publish in dry-run mode
        required: false
        default: false
        type: boolean

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          node_version: "22"
          pnpm_version: "10.17.1"

      - name: Upgrade npm for trusted publishing
        run: npm i -g npm@latest

      - name: Configure npm registry
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Test
        run: pnpm run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --access public --provenance --tag "${{ inputs.npm_tag }}" --dry-run
          else
            npm publish --access public --provenance --tag "${{ inputs.npm_tag }}"
          fi
