name: PR

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          install: "true"

      - name: Audit (prod only)
        run: pnpm audit --prod --audit-level high

      - name: Test
        run: pnpm run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Check docs links
        run: pnpm run docs:check

      - name: Build
        run: pnpm run build
